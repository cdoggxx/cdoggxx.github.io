<script>
  async function guessAge(name){
    const nameRegex = /^[a-zA-Z\s]+$/;
    if (!nameRegex.test(name)) {
        $("#response").text("Please enter a valid name.");
        return;
    }
    const safeName = encodeURIComponent(name);
    const response = await fetch("https://api.agify.io/?name="+safeName);
    const result = await response.json();
    $("#response" ).text("Hi " + name + ", your age should be " + result.age);
  }
</script>

<script>
  const xkcdApi = "https://corsproxy.io/?https://xkcd.com/info.0.json";

  $.getJSON(xkcdApi, function(data) {
    $("#comic-title").text(data.title);

    console.log("Error: Could not load the XKCD comic.");
  });
</script>



<script src="https://waph-phung.github.io/clock.js"></script>
<script>
  var canvas = document.getElementById("analog-clock");
  var ctx = canvas.getContext("2d");
  var radius = canvas.height / 2;
  ctx.translate(radius, radius);
  radius = radius * 0.90;
  setInterval(drawClock, 1000);
  function drawClock() {
    drawFace(ctx, radius);
    drawNumbers(ctx, radius);
    drawTime(ctx, radius);
  }
</script>
